name: Daily Price Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: price-sync-pages
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build static API snapshot
        working-directory: price_service
        env:
          CARDTRADER_BEARER_TOKEN: ${{ secrets.CARDTRADER_BEARER_TOKEN }}
        run: node scripts/sync-prices.mjs

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: price_service/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
